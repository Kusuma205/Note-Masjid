<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Baiturrahmah</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .active-tab {
            border-bottom: 3px solid white;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen pb-20">

    <div class="bg-emerald-600 text-white shadow-md sticky top-0 z-20">
        <div class="p-4 text-center">
            <h1 class="text-xl font-bold">Jurnal Masjid Baiturrahmah</h1>
        </div>
        <div class="flex justify-around text-sm pb-2">
            <button id="tab-input" onclick="switchTab('input')" class="pb-2 px-4 active-tab transition-all">Input
                Kegiatan</button>
            <button id="tab-riwayat" onclick="switchTab('riwayat')" class="pb-2 px-4 transition-all">Arsip
                Bulanan</button>
        </div>
    </div>

    <div id="section-input" class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white p-6 rounded-xl shadow-xs">
            <h2 id="form-title" class="text-lg font-bold text-gray-800 mb-4">Tambah Kegiatan</h2>
            <form id="kegiatanForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Tanggal</label>
                    <input type="date" id="input-tanggal" required
                        class="w-full p-2 border rounded-lg focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Hari</label>
                    <select id="input-hari" required class="w-full p-2 border rounded-lg focus:outline-emerald-500">
                        <option value="Senin">Senin</option>
                        <option value="Selasa">Selasa</option>
                        <option value="Rabu">Rabu</option>
                        <option value="Kamis">Kamis</option>
                        <option value="Jumat">Jumat</option>
                        <option value="Sabtu">Sabtu</option>
                        <option value="Minggu">Minggu</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Waktu Tugas</label>
                    <input type="text" id="input-waktu" placeholder="Contoh: 04:30 atau Isya" required
                        class="w-full p-2 border rounded-lg focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nama Kegiatan</label>
                    <input type="text" id="input-nama" placeholder="Nama agenda / kegiatan" required
                        class="w-full p-2 border rounded-lg focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Keterangan</label>
                    <textarea id="input-keterangan" placeholder="Keterangan tambahan (opsional)"
                        class="w-full p-2 border rounded-lg focus:outline-emerald-500" rows="3"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" id="submit-btn"
                        class="flex-1 bg-emerald-600 text-white py-2 rounded-lg font-semibold shadow-xs hover:bg-emerald-700 transition-all">Simpan
                        Catatan</button>
                    <button type="button" id="btn-batal-edit"
                        class="hidden bg-gray-300 text-gray-700 py-2 px-4 rounded-lg font-semibold hover:bg-gray-400 transition-all">Batal</button>
                </div>
            </form>
        </div>
        <div class="text-center">
            <button onclick="unduhExcel()"
                class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold shadow-md hover:bg-blue-700 transition-all">📥
                Export Laporan (.XLSX)</button>
        </div>
    </div>

    <div id="section-riwayat" class="max-w-md mx-auto p-4 hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">Arsip Kegiatan</h2>
            <button onclick="hapusSemua()" class="text-xs text-red-600 font-semibold hover:underline">Hapus
                Semua</button>
        </div>
        <div id="arsipContainer" class="space-y-4">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
