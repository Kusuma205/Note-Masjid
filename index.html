<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Baiturrahmah</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active-tab {
            border-bottom: 3px solid white;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen pb-20">

    <div class="bg-emerald-600 text-white shadow-md sticky top-0 z-20">
        <div class="p-4 text-center">
            <h1 class="text-xl font-bold">Jurnal Masjid Baiturrahmah</h1>
        </div>
        <div class="flex justify-around text-sm pb-2">
            <button onclick="switchTab('input')" id="tab-input" class="pb-2 px-4 active-tab">Input Tugas</button>
            <button onclick="switchTab('riwayat')" id="tab-riwayat" class="pb-2 px-4">Riwayat Bulanan</button>
        </div>
    </div>

    <div id="section-input" class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Catat Kegiatan</h2>
            <form id="kegiatanForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                    <input type="date" id="tanggal"
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-emerald-500"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Hari</label>
                    <select id="hari" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg" required>
                        <option value="Senin">Senin</option>
                        <option value="Selasa">Selasa</option>
                        <option value="Rabu">Rabu</option>
                        <option value="Kamis">Kamis</option>
                        <option value="Jumat">Jumat</option>
                        <option value="Sabtu">Sabtu</option>
                        <option value="Minggu">Minggu</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kegiatan</label>
                    <input type="text" id="namaKegiatan" placeholder="Contoh: Piket Masjid"
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Waktu</label>
                        <input type="time" id="waktu" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg"
                            required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Keterangan</label>
                    <textarea id="keterangan" rows="2"
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg"></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-emerald-600 text-white font-medium p-3 rounded-lg shadow-sm">Simpan</button>
            </form>
            <button onclick="exportKeExcel()"
                class="w-full bg-blue-600 text-white font-medium p-3 rounded-lg shadow-sm mt-3 flex items-center justify-center gap-2">
                📊 Download Excel
            </button>
        </div>
    </div>

    <div id="section-riwayat" class="max-w-md mx-auto p-4 hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">Arsip Kegiatan</h2>
            <button onclick="hapusSemua()" class="text-xs text-red-600">Hapus Semua</button>
        </div>
        <div id="arsipContainer" class="space-y-4">
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(tab) {
            const inputSec = document.getElementById('section-input');
            const riwayatSec = document.getElementById('section-riwayat');
            const tInput = document.getElementById('tab-input');
            const tRiwayat = document.getElementById('tab-riwayat');

            if (tab === 'input') {
                inputSec.classList.remove('hidden');
                riwayatSec.classList.add('hidden');
                tInput.classList.add('active-tab');
                tRiwayat.classList.remove('active-tab');
            } else {
                inputSec.classList.add('hidden');
                riwayatSec.classList.remove('hidden');
                tInput.classList.remove('active-tab');
                tRiwayat.classList.add('active-tab');
                tampilkanArsip();
            }
        }
    </script>
</body>

</html>
