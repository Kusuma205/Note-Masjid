<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Kegiatan Baiturrahmah</title>
    <!-- Menggunakan Tailwind CSS untuk tampilan HP yang modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen pb-10">

    <!-- Header Aplikasi -->
    <div class="bg-emerald-600 text-white p-5 shadow-md sticky top-0 z-10 text-center">
        <h1 class="text-xl font-bold">Jurnal Masjid Baiturrahmah</h1>
        <p class="text-xs opacity-90">Pencatatan Tugas: Jumat, Sabtu & Minggu</p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-6">

        <!-- Form Input Catatan -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Tambah Kegiatan Baru</h2>
            <form id="kegiatanForm" class="space-y-4">

                <!-- Pilih Hari -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Hari Tugas</label>
                    <select id="hari"
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-emerald-500 focus:border-emerald-500"
                        required>
                        <option value="Jumat">Jumat</option>
                        <option value="Sabtu">Sabtu</option>
                        <option value="Minggu">Minggu</option>
                    </select>
                </div>

                <!-- Nama Kegiatan -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Kegiatan / Tugas</label>
                    <input type="text" id="namaKegiatan" placeholder="Contoh: Piket Jumatan, Bersih Halaman"
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-emerald-500 focus:border-emerald-500"
                        required>
                </div>

                <!-- Waktu/Jam -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Waktu (WIB)</label>
                    <input type="time" id="waktu"
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-emerald-500 focus:border-emerald-500"
                        required>
                </div>

                <!-- Keterangan Tambahan -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Keterangan Tambahan</label>
                    <textarea id="keterangan" rows="2" placeholder="Catatan opsional (misal: Selesai)..."
                        class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-emerald-500 focus:border-emerald-500"></textarea>
                </div>

                <!-- Tombol Simpan -->
                <button type="submit"
                    class="w-full bg-emerald-600 text-white font-medium p-3 rounded-lg hover:bg-emerald-700 transition duration-200 shadow-sm mb-2">
                    Simpan Kegiatan
                </button>
            </form>

            <!-- FITUR BARU: Tombol Download Excel -->
            <button onclick="exportKeExcel()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-3 rounded-lg transition duration-200 shadow-sm flex items-center justify-center gap-2 mt-2">
                📊 Download File Excel (.csv)
            </button>
        </div>

        <!-- Area Tampilan List Data -->
        <div>
            <div class="flex justify-between items-center mb-3 px-1">
                <h2 class="text-lg font-bold text-gray-800">Daftar Kegiatan Tersimpan</h2>
                <button onclick="hapusSemua()" class="text-xs text-red-600 hover:underline">Hapus Semua</button>
            </div>

            <!-- Tempat data muncul -->
            <div id="daftarKegiatan" class="space-y-4">
                <!-- Data akan diisi otomatis oleh JavaScript -->
            </div>
        </div>

    </div>

    <!-- Logika Aplikasi (JavaScript) -->
    <script>
        const form = document.getElementById('kegiatanForm');
        const daftarContainer = document.getElementById('daftarKegiatan');

        // Mengambil data lama yang tersimpan di HP/Browser
        let dataKegiatan = JSON.parse(localStorage.getItem('kegiatanBaiturrahmah')) || [];

        // Fungsi menampilkan data ke layar HP
        function tampilkanData() {
            daftarContainer.innerHTML = '';

            if (dataKegiatan.length === 0) {
                daftarContainer.innerHTML = `<p class="text-center text-gray-500 text-sm py-8 bg-white rounded-xl border border-dashed">Belum ada kegiatan yang dicatat.</p>`;
                return;
            }

            // Urutkan otomatis berdasarkan hari (Jumat -> Sabtu -> Minggu) agar rapi
            const urutanHari = { "Jumat": 1, "Sabtu": 2, "Minggu": 3 };
            dataKegiatan.sort((a, b) => urutanHari[a.hari] - urutanHari[b.hari] || a.waktu.localeCompare(b.waktu));

            dataKegiatan.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-xs border-l-4 border-emerald-500 flex justify-between items-start";

                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 text-xs font-semibold bg-emerald-100 text-emerald-800 rounded">
                                ${item.hari}
                            </span>
                            <span class="text-xs text-gray-500 font-mono">${item.waktu} WIB</span>
                        </div>
                        <h3 class="font-semibold text-gray-800 mt-1">${item.namaKegiatan}</h3>
                        ${item.keterangan ? `<p class="text-xs text-gray-600 mt-1 italic">"${item.keterangan}"</p>` : ''}
                    </div>
                    <button onclick="hapusSatu(${index})" class="text-gray-400 hover:text-red-500 text-sm p-1">
                        ✕
                    </button>
                `;
                daftarContainer.appendChild(card);
            });
        }

        // Event saat tombol 'Simpan' ditekan
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const dataBaru = {
                hari: document.getElementById('hari').value,
                namaKegiatan: document.getElementById('namaKegiatan').value,
                waktu: document.getElementById('waktu').value,
                keterangan: document.getElementById('keterangan').value.replace(/,/g, '-') // Mencegah error format Excel
            };

            dataKegiatan.push(dataBaru);
            localStorage.setItem('kegiatanBaiturrahmah', JSON.stringify(dataKegiatan)); // Simpan aman di HP

            tampilkanData();
            form.reset(); // Kosongkan form kembali
        });

        // Fungsi ekspor data ke file Excel (.csv)
        function exportKeExcel() {
            if (dataKegiatan.length === 0) {
                alert("Belum ada data untuk diunduh. Silakan isi kegiatan terlebih dahulu!");
                return;
            }

            // Header kolom Excel
            let csvContent = "data:text/csv;charset=utf-8,Hari,Waktu,Nama Kegiatan,Keterangan\n";

            // Masukkan baris demi baris data
            dataKegiatan.forEach(function (rowArray) {
                let row = `${rowArray.hari},${rowArray.waktu},${rowArray.namaKegiatan},${rowArray.keterangan}`;
                csvContent += row + "\r\n";
            });

            // Proses unduh file di HP/Laptop
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Log_Kegiatan_Baiturrahmah.csv");
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }

        // Fungsi hapus satu catatan
        function hapusSatu(index) {
            if (confirm('Hapus catatan ini?')) {
                dataKegiatan.splice(index, 1);
                localStorage.setItem('kegiatanBaiturrahmah', JSON.stringify(dataKegiatan));
                tampilkanData();
            }
        }

        // Fungsi hapus semua data di aplikasi
        function hapusSemua() {
            if (confirm('Apakah Anda yakin ingin menghapus semua catatan kegiatan?')) {
                dataKegiatan = [];
                localStorage.removeItem('kegiatanBaiturrahmah');
                tampilkanData();
            }
        }

        // Jalankan pemuatan data saat aplikasi pertama kali dibuka
        tampilkanData();
    </script>
</body>

</html>
